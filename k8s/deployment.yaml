apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api-deployment
  namespace: production      # Targets the Terraform-managed production environment
  labels:
    app: order-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      serviceAccountName: jenkins-deployer-sa  # Runs under Terraform's CI/CD identity
      containers:
      - name: order-api
        image: kirandevraaj/order-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: APP_VERSION
          value: "v1.0.0"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 3